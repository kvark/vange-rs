name: Check
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - run: cargo check
    - run: cargo clippy --workspace -- -D warnings
    - run: cargo test --all

  snapshot:
    name: Snapshot tests (lavapipe)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install lavapipe
      run: |
        sudo apt-get update
        sudo apt-get install -y mesa-vulkan-drivers vulkan-tools
    - name: Verify Vulkan
      run: |
        VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/lvp_icd.json vulkaninfo --summary || \
        VK_ICD_FILENAMES=$(find /usr -name "lvp_icd*" 2>/dev/null | head -1) vulkaninfo --summary || \
        echo "WARNING: vulkaninfo failed, lavapipe may not work"
    - name: Build level binary
      run: cargo build --release --bin level
    - name: Snapshot RayTraced
      run: |
        VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/lvp_icd.json \
        WGPU_BACKEND=vulkan \
        cargo run --release --bin level -- --snapshot snapshots/ray.png --terrain RayTraced
    - name: Snapshot Sliced
      run: |
        VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/lvp_icd.json \
        WGPU_BACKEND=vulkan \
        cargo run --release --bin level -- --snapshot snapshots/sliced.png --terrain Sliced
    - name: Snapshot Painted
      run: |
        VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/lvp_icd.json \
        WGPU_BACKEND=vulkan \
        cargo run --release --bin level -- --snapshot snapshots/painted.png --terrain Painted

    # Voxel-terrain reftest at the same Fostral citadel cluster used by
    # tools/bench-voxel.sh. Correctness-only: no perf gate, just a smoke
    # test that the bake + draw + shadow path doesn't crash and produces
    # a non-empty image at three reference cameras. Real assets come from
    # the data-0 release the deploy job already publishes.
    - name: Download Fostral + common assets
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p docs/data-0
        gh release download data-0 --repo ${{ github.repository }} \
          --pattern 'fostral.zip' --pattern 'common.zip' \
          --dir docs/data-0
    - name: Voxel snapshots (Fostral, 30°/60°/90°)
      env:
        VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.json
        WGPU_BACKEND: vulkan
      run: |
        for elev in 30 60 90; do
          cargo run --release --bin level --quiet -- \
            --snapshot "snapshots/voxel-ci-${elev}.png" \
            --terrain RayVoxelTraced \
            --level-zip docs/data-0/fostral.zip \
            --common-zip docs/data-0/common.zip \
            --width 320 --height 240 \
            --cam-target "576,896,80" \
            --cam-distance 350 \
            --cam-elev "$elev" \
            --warmup 20 --frames 1
        done
    - name: Upload snapshots
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: terrain-snapshots
        path: snapshots/

  multiplayer:
    name: Multiplayer integration tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run server integration tests
      run: cargo test -p vangers-server --test integration -- --test-threads=1

  wasm:
    name: WASM build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Add wasm target
      run: rustup target add wasm32-unknown-unknown
    - name: Install wasm-bindgen-cli
      run: cargo install wasm-bindgen-cli --version 0.2.117
    - name: Build WASM binary
      run: cargo build --target wasm32-unknown-unknown --features web --bin web --release
    - name: Generate JS bindings
      run: |
        wasm-bindgen target/wasm32-unknown-unknown/release/web.wasm --out-dir docs/ --target web --no-typescript
    - name: Upload web demo
      uses: actions/upload-artifact@v4
      with:
        name: web-demo
        path: docs/
