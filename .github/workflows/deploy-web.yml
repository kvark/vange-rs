name: Deploy Web
on:
  push:
    branches: [master]
    # Only run the deploy when something that affects the web build
    # has changed. This avoids re-publishing ~400 MB of release data
    # for unrelated commits (road/server/ffi/docs-unrelated edits).
    paths:
      - 'src/**'
      - 'lib/**'
      - 'bin/web/**'
      - 'docs/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/deploy-web.yml'
  # Allow manual re-deploys — useful after uploading new assets to
  # the data-0 release (which doesn't trigger the push event).
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install wasm-bindgen-cli
      run: cargo install wasm-bindgen-cli --version 0.2.117

    - name: Add wasm target
      run: rustup target add wasm32-unknown-unknown

    - name: Build WASM binary
      run: cargo build --target wasm32-unknown-unknown --features web --bin web --release
      env:
        VANGERS_SERVER_WS: ${{ secrets.VANGERS_SERVER_WS }}

    - name: Generate JS bindings
      run: wasm-bindgen target/wasm32-unknown-unknown/release/web.wasm --out-dir docs/ --target web --no-typescript

    # Cache the release assets between runs. The key is derived from
    # the list of asset names and sizes in the release, so uploading a
    # new common.zip (or any asset) automatically invalidates the
    # cache — no manual key-bumping needed.
    - name: Compute release cache key
      id: release-key
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        hash=$(gh release view data-0 --json assets \
          -q '[.assets[] | "\(.name):\(.size)"] | sort | join(",")' \
          --repo ${{ github.repository }} | sha256sum | cut -d' ' -f1)
        echo "key=release-data-0-${hash:0:16}" >> "$GITHUB_OUTPUT"
        echo "Cache key: release-data-0-${hash:0:16}"

    - name: Cache data-0 release assets
      id: cache-data
      uses: actions/cache@v4
      with:
        path: docs/data-0
        key: ${{ steps.release-key.outputs.key }}

    # Bundle the data-0 release into the Pages site so the client
    # fetches the zips same-origin from vange.rs — no CORS proxy,
    # no api.github.com round-trip. The directory is gitignored; it
    # only exists during the Pages build.
    - name: Download data-0 release assets
      if: steps.cache-data.outputs.cache-hit != 'true'
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p docs/data-0
        gh release download data-0 --dir docs/data-0 --repo ${{ github.repository }}

    - name: Report bundled data
      run: |
        echo "Bundled release into docs/data-0 (cache hit: ${{ steps.cache-data.outputs.cache-hit || 'false' }}):"
        ls -lh docs/data-0/

    - name: Build Jekyll site
      uses: actions/jekyll-build-pages@v1
      with:
        source: docs/
        destination: _site/

    - name: Upload pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
