[package]
name = "vangers-server"
version = "0.1.0"
edition = "2021"
publish = false

[[bin]]
name = "vangers-server"
path = "src/main.rs"

[dependencies]
vangers = { path = "../.." }
vangers-net = { path = "../../lib/net" }
glam = "0.29"
tokio = { version = "1", features = ["rt-multi-thread", "net", "macros", "time", "sync", "io-util"] }
clap = { version = "4", features = ["derive"] }
log = "0.4"
env_logger = "0.11"
bincode = "1"
